name: bench
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (lightweight for bench)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # bench doesn't need the full stack; install only what the starter smoke suite uses
          pip install httpx pytest

      - name: Run benchmarks
        id: run_bench
        run: |
          mkdir -p proof/benchmarks
          python scripts/run_benchmarks.py --out proof/benchmarks/latest.json

      - name: Gate against baseline
        id: gate
        run: |
          python scripts/gate_benchmark.py \
            proof/benchmarks/latest.json \
            proof/benchmarks/baseline.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-report
          path: |
            proof/benchmarks/latest.json
            proof/benchmarks/baseline.json

      - name: Baseline-update (if labeled)
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'baseline-update')
        run: |
          cp proof/benchmarks/latest.json proof/benchmarks/baseline.json
          echo "::notice::baseline.json updated from latest via baseline-update label"
