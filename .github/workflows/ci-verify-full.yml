# Full verification gate: backend pytest (incl. live RLS tests) + API healthcheck + frontend lint/tests.
# Failing jobs block merges; wire this workflow as a required status check in branch protection.
# Reusable via workflow_call from crucibai-verify.yml (manual / chained gates).
name: Verify full stack

on:
  workflow_call:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

concurrency:
  group: verify-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: crucibai
          POSTGRES_PASSWORD: crucibai
          POSTGRES_DB: crucibai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crucibai -d crucibai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      GITHUB_ACTIONS: "true"
      CRUCIBAI_SPEC_GUARD_MODE: strict
      DATABASE_URL: postgresql://crucibai:crucibai@127.0.0.1:5432/crucibai
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-for-pytest
      DISABLE_CSRF_FOR_TEST: "1"
      CRUCIBAI_TEST: "1"
      CRUCIBAI_DEV: "1"
      FRONTEND_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: test.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: test-google-client-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Pytest (all backend tests)
        working-directory: backend
        run: |
          python -m pytest tests/ -q --tb=short --ignore=tests/run_production_validation.py

      - name: Uvicorn smoke + healthcheck script
        working-directory: backend
        run: |
          set -euo pipefail
          PORT=18999
          python -m uvicorn server:app --host 127.0.0.1 --port "$PORT" &
          UV_PID=$!
          sleep 12
          curl -fsS "http://127.0.0.1:${PORT}/api/health" | head -c 500
          echo
          chmod +x ../deploy/healthcheck.sh
          ../deploy/healthcheck.sh "http://127.0.0.1:${PORT}"
          kill "$UV_PID" || true
          wait "$UV_PID" 2>/dev/null || true

  verify-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and verify frontend
        working-directory: frontend
        env:
          CI: "true"
          ESLINT_WARN_BUDGET: "50"
        run: |
          npm ci
          npm run lint:ci
          npm run lint:warn-budget
          npm run test:ci

  # Single status check name for branch protection: require `verify-all-passed`.
  verify-all-passed:
    runs-on: ubuntu-latest
    needs: [verify-backend, verify-frontend]
    steps:
      - name: Gate
        run: echo "All verification jobs passed — merge or deploy only after this check is green."
