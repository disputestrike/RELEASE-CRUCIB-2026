# Primary merge gate: `.github/workflows/ci-verify-full.yml` (backend pytest + frontend lint/test/build).
# This workflow is kept for Docker publish / integration hooks; lint + unit jobs use repo layout (backend/, frontend/).

name: CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    name: Lint and Type Check

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint black isort flake8 mypy

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Python linting
        run: |
          pylint backend/**/*.py --exit-zero
          flake8 backend --exit-zero
          black --check backend
          isort --check-only backend

      - name: Run Python type checking
        run: mypy backend --ignore-missing-imports

      - name: Run Node linting
        working-directory: frontend
        run: npm run lint

      - name: Frontend production build (smoke)
        working-directory: frontend
        env:
          CI: "true"
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety
          npm install -g snyk

      - name: Run Bandit (Python security)
        run: bandit -r backend -f json -o bandit-report.json || true

      - name: Run Safety (Python dependencies)
        run: safety check --json > safety-report.json || true

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=moderate || true

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: crucibai
          POSTGRES_PASSWORD: crucibai
          POSTGRES_DB: crucibai
        options: >-
          --health-cmd "pg_isready -U crucibai -d crucibai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Architecture guardrails
        working-directory: backend
        run: |
          python scripts/verify_architecture_guardrails.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Python unit tests
        working-directory: backend
        env:
          GITHUB_ACTIONS: "true"
          CRUCIBAI_TEST: "1"
          DISABLE_CSRF_FOR_TEST: "1"
          DATABASE_URL: postgresql://crucibai:crucibai@127.0.0.1:5432/crucibai
          REDIS_URL: redis://127.0.0.1:6379/0
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-for-pytest
          FRONTEND_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: test.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: test-google-client-secret
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --ignore=tests/run_production_validation.py

      - name: Regenerate public proof index + landing
        env:
          CRUCIB_PROOF_HMAC_SECRET: local-proof-test-secret
        run: |
          python scripts/generate-public-proof-index.py

      - name: Verify signed proof manifests
        env:
          CRUCIB_PROOF_HMAC_SECRET: local-proof-test-secret
        run: |
          python scripts/verify-public-proof-bundle.py

      - name: Run JavaScript unit tests
        working-directory: frontend
        env:
          CI: "true"
        run: npm run test:ci

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: backend/htmlcov/

  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [lint-and-type-check, security-scan, unit-tests]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: build
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crucibai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run integration tests
        working-directory: backend
        env:
          GITHUB_ACTIONS: "true"
          CRUCIBAI_TEST: "1"
          DISABLE_CSRF_FOR_TEST: "1"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crucibai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-for-pytest
        run: |
          python -m pytest tests/test_integration.py -v

  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Deploy to Railway (Staging)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID_STAGING }}
        run: |
          npm install -g @railway/cli
          railway deploy --service backend

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://crucibai.com

    steps:
      - uses: actions/checkout@v6

      - name: Manual approval required
        run: |
          echo "Deployment to production requires manual approval"
          echo "Please review the changes and approve in GitHub Actions"

      - name: Deploy to Railway (Production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID_PROD }}
        run: |
          npm install -g @railway/cli
          railway deploy --service backend

      - name: Run smoke tests
        run: |
          npm run test:smoke

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployment to production successful!'
            })
