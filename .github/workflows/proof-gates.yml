name: Proof gates

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]
  workflow_dispatch:

concurrency:
  group: proof-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-proof:
    name: Backend proof commands
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CRUCIBAI_TEST: "1"
      DISABLE_CSRF_FOR_TEST: "1"
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-for-pytest
      CRUCIBAI_INTERNAL_TOKEN: ci-internal-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile proof-gate modules
        run: |
          python -m py_compile \
            backend/orchestration/build_integrity_validator.py \
            backend/orchestration/import_doctor.py \
            backend/automation/executor.py \
            backend/orchestration/auto_runner.py \
            scripts/verify_claim_evidence_parity.py

      - name: Public claim/evidence parity
        run: python scripts/verify_claim_evidence_parity.py

      - name: Focused validator/import/run_agent proof tests
        run: |
          python -m pytest \
            backend/tests/test_build_integrity_validator.py \
            backend/tests/test_import_doctor.py \
            backend/tests/test_automation_run_agent_safety.py \
            -q

      - name: Full configured backend smoke suite
        run: |
          python -m pytest -q --basetemp=/tmp/crucibai-pytest-proof

      - name: Write backend proof summary
        if: always()
        run: |
          mkdir -p proof-ci
          cat > proof-ci/backend-proof-summary.md <<'EOF'
          # Backend Proof Summary

          Commands:
          - python -m py_compile backend/orchestration/build_integrity_validator.py backend/orchestration/import_doctor.py backend/automation/executor.py backend/orchestration/auto_runner.py scripts/verify_claim_evidence_parity.py
          - python scripts/verify_claim_evidence_parity.py
          - python -m pytest backend/tests/test_build_integrity_validator.py backend/tests/test_import_doctor.py backend/tests/test_automation_run_agent_safety.py -q
          - python -m pytest -q --basetemp=/tmp/crucibai-pytest-proof
          EOF

      - name: Upload backend proof summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-proof-summary
          path: proof-ci/backend-proof-summary.md

  frontend-proof:
    name: Frontend proof commands
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend test suite
        working-directory: frontend
        env:
          CI: "true"
        run: npm test -- --watchAll=false --runInBand

      - name: Frontend production build
        working-directory: frontend
        env:
          CI: "true"
        run: npm run build

      - name: Frontend production dependency audit
        working-directory: frontend
        run: |
          mkdir -p ../proof-ci
          npm audit --omit=dev --audit-level=high --json > ../proof-ci/frontend-production-audit.json
          npm audit --omit=dev --audit-level=high

      - name: Write frontend proof summary
        if: always()
        run: |
          mkdir -p proof-ci
          cat > proof-ci/frontend-proof-summary.md <<'EOF'
          # Frontend Proof Summary

          Commands:
          - npm ci --legacy-peer-deps
          - npm test -- --watchAll=false --runInBand
          - npm run build
          - npm audit --omit=dev --audit-level=high
          EOF

      - name: Upload frontend proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-proof-artifacts
          path: |
            proof-ci/frontend-proof-summary.md
            proof-ci/frontend-production-audit.json

  proof-gates-passed:
    name: Proof gates passed
    runs-on: ubuntu-latest
    needs: [backend-proof, frontend-proof]
    steps:
      - run: echo "All BUILD_EVIDENCE_MATRIX proof commands passed."
