name: Runtime Authority Guard

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  runtime-authority-guard:
    runs-on: ubuntu-latest
    name: Runtime Authority Guard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run legacy execution guard
        run: python scripts/check_no_legacy_execution.py

      - name: Run backend AST audit
        run: python -m pytest backend/tests/test_single_brain_backend_audit.py -q
