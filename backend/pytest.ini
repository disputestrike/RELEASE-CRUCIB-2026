# CrucibAI Backend – Pytest config (Layer 3 Integration / Layer 9 Smoke)
[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
markers =
    golden: deterministic golden-path regression checks (eval score / Phase 3)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
# Optional: JUnit XML for CI
# addopts = -v --tb=short --junitxml=../test_reports/pytest/results.xml
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
cache_dir = .pytest_cache_backend
[tool:pytest]
env =
    DISABLE_CSRF_FOR_TEST=1
    CRUCIBAI_DEV=1
    CRUCIBAI_TEST=1
