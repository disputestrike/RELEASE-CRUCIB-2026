# Local dev: backend on port 8000 so frontend (localhost:3000) proxy can connect.
# Usage:
#   docker-compose up -d backend    # backend only (you need DATABASE_URL for a real DB)
#   docker-compose up -d           # backend + postgres (backend uses postgres:5432)
# Then run frontend on host: cd frontend && npm start → open http://localhost:3000

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CRUCIBAI_DEV=1
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-postgresql://crucibai:crucibai@postgres:5432/crucibai}
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crucibai
      POSTGRES_PASSWORD: crucibai
      POSTGRES_DB: crucibai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crucibai -d crucibai"]
      interval: 5s
      timeout: 3s
      retries: 5
