# CrucibAI Prometheus Configuration
# Scrapes the /api/metrics endpoint for application metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'crucibai'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['localhost:8000']
        labels:
          app: 'crucibai'
          environment: 'production'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          app: 'crucibai-host'
