[pytest]
testpaths =
    backend/tests/test_provider_fallback_paths.py
    backend/tests/test_tool_policy_skill_enforcement.py
    backend/tests/test_policy_skill_tool_integration.py
    backend/tests/test_runtime_eventing.py
    backend/tests/test_runtime_single_brain_guards.py
    backend/tests/test_single_brain_backend_audit.py
    backend/tests/test_runtime_routes.py
    backend/tests/test_spawn_simulation.py
    backend/tests/test_repeatability_benchmark.py
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
markers =
    golden: deterministic golden-path regression checks
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
